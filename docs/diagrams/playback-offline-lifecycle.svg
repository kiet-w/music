<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="720" viewBox="0 0 1350 720" role="img" aria-labelledby="title desc">
  <title id="title">Playback and Offline Lifecycle</title>
  <desc id="desc">Lifecycle for playing remote audio, downloading offline, and playing local audio.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.r{fill:#e0f2fe;stroke:#0284c7}.l{fill:#dcfce7;stroke:#16a34a}.w{fill:#fef3c7;stroke:#d97706}.txt{font:700 18px Arial,sans-serif;fill:#0f172a}.small{font:400 15px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#a)}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1350" height="720"/>
  <text class="title" x="60" y="58">Playback and Offline Lifecycle</text>
  <text class="small" x="62" y="88">Backend provides Track.url; frontend decides whether to play remote URL or local offline file.</text>
  <rect class="box r" x="70" y="230" width="190" height="80"/><text class="txt" x="110" y="263">Remote Only</text><text class="small" x="105" y="288">Track.url exists</text>
  <rect class="box w" x="340" y="130" width="220" height="85"/><text class="txt" x="390" y="163">Download</text><text class="small" x="375" y="190">useOfflineStorage</text>
  <rect class="box l" x="640" y="130" width="220" height="85"/><text class="txt" x="680" y="163">Offline Ready</text><text class="small" x="675" y="190">local URI exists</text>
  <rect class="box r" x="340" y="380" width="220" height="85"/><text class="txt" x="390" y="413">Play Remote</text><text class="small" x="370" y="440">Howler uses Track.url</text>
  <rect class="box l" x="640" y="380" width="220" height="85"/><text class="txt" x="695" y="413">Play Local</text><text class="small" x="675" y="440">Howler uses local URI</text>
  <rect class="box w" x="940" y="255" width="220" height="85"/><text class="txt" x="995" y="288">PlayerBar</text><text class="small" x="975" y="315">pause/resume/seek</text>
  <rect class="box" x="940" y="500" width="220" height="85"/><text class="txt" x="990" y="533">Remove Offline</text><text class="small" x="973" y="560">fallback to remote</text>
  <path class="arrow" d="M260 265 C310 235 315 175 340 172"/><path class="arrow" d="M560 172 L640 172"/>
  <path class="arrow" d="M260 285 C310 335 320 400 340 422"/>
  <path class="arrow" d="M750 215 L750 380"/>
  <path class="arrow" d="M560 422 L640 422"/>
  <path class="arrow" d="M860 422 C910 390 930 325 940 300"/>
  <path class="arrow" d="M560 422 C720 520 870 370 940 315"/>
  <path class="arrow" d="M750 465 C800 560 890 555 940 542"/>
  <path class="arrow" d="M940 542 C700 650 315 610 165 310"/>
  <text class="small" x="74" y="640">Optimization: audio streaming does not pass through backend API. Backend stores metadata and public URL; client handles playback.</text>
</svg>
