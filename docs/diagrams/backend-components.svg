<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Backend Component Diagram</title>
  <desc id="desc">NestJS backend modules and service dependencies.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.mod{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.ctrl{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:12}.svc{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:12}.repo{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:12}.infra{fill:#f3e8ff;stroke:#9333ea;stroke-width:2;rx:12}.txt{font:700 16px Arial,sans-serif;fill:#0f172a}.small{font:400 13px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.dash{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a);stroke-dasharray:6 6}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="60" y="58">Backend Component Diagram</text>
  <text class="small" x="62" y="88">NestJS modules, controllers, services, repositories, and infrastructure dependencies.</text>
  <rect class="mod" x="60" y="135" width="1380" height="690"/>
  <text class="txt" x="90" y="170">AppModule imports Auth, Albums, Songs, Jobs, Storage, GoogleDrive, Admin, Prisma</text>

  <rect class="ctrl" x="95" y="220" width="190" height="55"/><text class="txt" x="125" y="254">AuthController</text>
  <rect class="svc" x="95" y="315" width="190" height="55"/><text class="txt" x="135" y="349">AuthService</text>
  <rect class="repo" x="95" y="410" width="190" height="55"/><text class="txt" x="126" y="444">UserRepository</text>

  <rect class="ctrl" x="350" y="220" width="190" height="55"/><text class="txt" x="374" y="254">AlbumController</text>
  <rect class="svc" x="350" y="315" width="190" height="55"/><text class="txt" x="386" y="349">AlbumService</text>
  <rect class="repo" x="350" y="410" width="190" height="55"/><text class="txt" x="378" y="444">AlbumRepository</text>

  <rect class="ctrl" x="605" y="220" width="190" height="55"/><text class="txt" x="635" y="254">SongController</text>
  <rect class="svc" x="605" y="315" width="190" height="55"/><text class="txt" x="646" y="349">SongService</text>
  <rect class="repo" x="605" y="410" width="190" height="55"/><text class="txt" x="636" y="444">SongRepository</text>

  <rect class="ctrl" x="860" y="220" width="220" height="55"/><text class="txt" x="890" y="254">DriveController</text>
  <rect class="svc" x="860" y="315" width="220" height="55"/><text class="txt" x="903" y="349">DriveService</text>
  <rect class="infra" x="860" y="410" width="220" height="55"/><text class="txt" x="900" y="444">Google Drive API</text>

  <rect class="svc" x="1145" y="220" width="220" height="55"/><text class="txt" x="1180" y="254">StorageService</text>
  <rect class="infra" x="1145" y="315" width="220" height="55"/><text class="txt" x="1178" y="349">Supabase Storage</text>
  <rect class="svc" x="1145" y="410" width="220" height="55"/><text class="txt" x="1170" y="444">CleanupService</text>

  <rect class="infra" x="605" y="580" width="190" height="55"/><text class="txt" x="642" y="614">BullMQ Queue</text>
  <rect class="svc" x="860" y="580" width="220" height="55"/><text class="txt" x="900" y="614">ConversionWorker</text>
  <rect class="svc" x="1145" y="580" width="220" height="55"/><text class="txt" x="1180" y="614">DownloaderService</text>
  <rect class="infra" x="605" y="705" width="220" height="55"/><text class="txt" x="672" y="739">Prisma</text>
  <rect class="infra" x="900" y="705" width="220" height="55"/><text class="txt" x="948" y="739">PostgreSQL</text>

