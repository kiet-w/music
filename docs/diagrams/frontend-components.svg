<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Frontend Component Diagram</title>
  <desc id="desc">Next.js frontend components, stores, hooks, and API client dependencies.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:14}.page{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;rx:14}.store{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:14}.hook{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:14}.api{fill:#f3e8ff;stroke:#9333ea;stroke-width:2;rx:14}.txt{font:700 16px Arial,sans-serif;fill:#0f172a}.small{font:400 13px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.dash{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a);stroke-dasharray:6 6}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="60" y="58">Frontend Component Diagram</text>
  <text class="small" x="62" y="88">Next.js routes use shared stores, API helpers, realtime hooks, and playback state.</text>

  <rect class="box" x="60" y="130" width="250" height="70"/><text class="txt" x="110" y="160">LocaleLayout</text><text class="small" x="92" y="184">AuthGate + PlayerBar + tabs</text>
  <rect class="store" x="380" y="130" width="230" height="70"/><text class="txt" x="430" y="160">useAuthStore</text><text class="small" x="415" y="184">token, user, hydrate</text>
  <rect class="api" x="700" y="130" width="230" height="70"/><text class="txt" x="765" y="160">api.ts</text><text class="small" x="742" y="184">fetch helpers + headers</text>
  <rect class="box" x="1020" y="130" width="230" height="70"/><text class="txt" x="1080" y="160">Backend</text><text class="small" x="1060" y="184">NestJS REST API</text>

  <rect class="page" x="90" y="270" width="210" height="65"/><text class="txt" x="128" y="310">HomePage</text>
  <rect class="page" x="90" y="370" width="210" height="65"/><text class="txt" x="128" y="410">AlbumsPage</text>
  <rect class="page" x="90" y="470" width="210" height="65"/><text class="txt" x="114" y="510">AlbumDetail</text>
  <rect class="page" x="90" y="570" width="210" height="65"/><text class="txt" x="128" y="610">MusicPage</text>
  <rect class="page" x="90" y="670" width="210" height="65"/><text class="txt" x="125" y="710">Login/Register</text>

  <rect class="store" x="380" y="315" width="230" height="65"/><text class="txt" x="425" y="355">useAlbumStore</text>
  <rect class="store" x="380" y="520" width="230" height="65"/><text class="txt" x="425" y="560">usePlayerStore</text>
  <rect class="hook" x="700" y="315" width="230" height="65"/><text class="txt" x="735" y="355">Realtime Hook</text>
  <rect class="hook" x="700" y="520" width="230" height="65"/><text class="txt" x="750" y="560">Offline Hook</text>
  <rect class="box" x="1020" y="315" width="230" height="65"/><text class="txt" x="1077" y="355">Library</text>
  <rect class="box" x="1020" y="420" width="230" height="65"/><text class="txt" x="1062" y="460">Downloader</text>
  <rect class="box" x="1020" y="525" width="230" height="65"/><text class="txt" x="1070" y="565">PlayerBar</text>
  <rect class="box" x="1020" y="630" width="230" height="65"/><text class="txt" x="1065" y="670">DrivePicker</text>

  <path class="arrow" d="M310 165 L380 165"/><path class="arrow" d="M610 165 L700 165"/><path class="arrow" d="M930 165 L1020 165"/>
  <path class="arrow" d="M300 302 C335 305 350 335 380 345"/><path class="arrow" d="M300 402 C335 390 350 360 380 350"/>
  <path class="arrow" d="M300 502 C360 510 385 540 380 552"/>
  <path class="arrow" d="M300 602 C580 610 790 460 1020 452"/>
  <path class="arrow" d="M300 702 C520 720 625 205 700 165"/>
