<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">YouTube Track Lifecycle</title>
  <desc id="desc">Lifecycle of a YouTube track from pending record to ready playable audio.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.pending{fill:#fef3c7;stroke:#d97706}.work{fill:#e0f2fe;stroke:#0284c7}.ready{fill:#dcfce7;stroke:#16a34a}.fail{fill:#fee2e2;stroke:#dc2626}.txt{font:700 18px Arial,sans-serif;fill:#0f172a}.small{font:400 15px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#a)}.dash{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a);stroke-dasharray:7 7}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1500" height="760"/>
  <text class="title" x="60" y="58">YouTube Track Lifecycle</text>
  <text class="small" x="62" y="88">POST /songs/youtube creates a pending Track, then BullMQ worker converts and uploads audio.</text>
  <rect class="box pending" x="60" y="210" width="190" height="90"/><text class="txt" x="95" y="244">Pending Create</text><text class="small" x="92" y="272">frontend submit</text>
  <rect class="box pending" x="310" y="210" width="210" height="90"/><text class="txt" x="350" y="244">Track Inserted</text><text class="small" x="345" y="272">url is empty</text>
  <rect class="box work" x="590" y="210" width="200" height="90"/><text class="txt" x="635" y="244">Queued</text><text class="small" x="625" y="272">BullMQ convert</text>
  <rect class="box work" x="860" y="120" width="220" height="90"/><text class="txt" x="910" y="154">Downloading</text><text class="small" x="908" y="182">yt-dlp output mp3</text>
  <rect class="box work" x="860" y="310" width="220" height="90"/><text class="txt" x="925" y="344">Uploading</text><text class="small" x="900" y="372">Supabase Storage</text>
  <rect class="box ready" x="1160" y="210" width="220" height="90"/><text class="txt" x="1210" y="244">Ready</text><text class="small" x="1190" y="272">Track.url public URL</text>
  <rect class="box ready" x="1160" y="440" width="220" height="90"/><text class="txt" x="1202" y="474">Playable</text><text class="small" x="1182" y="502">Howler remote/local</text>
  <rect class="box fail" x="590" y="500" width="250" height="95"/><text class="txt" x="657" y="535">Failed</text><text class="small" x="620" y="562">yt-dlp/storage/db error</text>
  <path class="arrow" d="M250 255 L310 255"/><path class="arrow" d="M520 255 L590 255"/>
  <path class="arrow" d="M790 245 C830 220 840 180 860 165"/>
  <path class="arrow" d="M970 210 L970 310"/>
  <path class="arrow" d="M1080 355 C1120 330 1135 275 1160 255"/>
  <path class="arrow" d="M1270 300 L1270 440"/>
  <path class="dash" d="M970 210 C910 450 820 500 760 500"/><path class="dash" d="M970 400 C930 475 870 520 840 545"/>
  <text class="small" x="620" y="640">Current code infers pending/failed from empty url. A future Track.status field would make this clearer.</text>
</svg>
