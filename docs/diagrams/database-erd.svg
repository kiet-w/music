<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760" role="img" aria-labelledby="title desc">
  <title id="title">Database ERD</title>
  <desc id="desc">Prisma database entity relationship diagram for User, Album, and Track.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.sub{font:400 16px Arial,sans-serif;fill:#475569}.entity{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.head{fill:#e0f2fe;stroke:#334155;stroke-width:2}.field{font:500 17px Arial,sans-serif;fill:#0f172a}.pk{font:700 17px Arial,sans-serif;fill:#be123c}.fk{font:700 17px Arial,sans-serif;fill:#0369a1}.rel{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.note{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:14}.small{font:400 15px Arial,sans-serif;fill:#475569}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,8 L11,4 z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1300" height="760"/>
  <text class="title" x="60" y="58">Database Diagram - Prisma Schema</text>
  <text class="sub" x="62" y="88">Track ownership is derived through Track.album.userId, not a direct Track.userId field.</text>

  <rect class="entity" x="70" y="150" width="320" height="360"/>
  <rect class="head" x="70" y="150" width="320" height="62" rx="18"/>
  <text class="field" x="195" y="188">User</text>
  <text class="pk" x="100" y="245">PK id: String uuid</text>
  <text class="field" x="100" y="280">email: String unique</text>
  <text class="field" x="100" y="315">passwordHash: String</text>
  <text class="field" x="100" y="350">name: String?</text>
  <text class="field" x="100" y="385">createdAt: DateTime</text>
  <text class="field" x="100" y="420">updatedAt: DateTime</text>
  <text class="small" x="100" y="468">Relation: albums[]</text>

  <rect class="entity" x="500" y="130" width="330" height="430"/>
  <rect class="head" x="500" y="130" width="330" height="62" rx="18"/>
  <text class="field" x="645" y="168">Album</text>
  <text class="pk" x="530" y="225">PK id: String uuid</text>
  <text class="field" x="530" y="260">title: String</text>
  <text class="field" x="530" y="295">artist: String?</text>
  <text class="field" x="530" y="330">coverUrl: String?</text>
  <text class="field" x="530" y="365">isDefault: Boolean</text>
  <text class="fk" x="530" y="400">FK userId: String</text>
  <text class="field" x="530" y="435">createdAt: DateTime</text>
  <text class="small" x="530" y="485">Indexes: [userId], [userId,isDefault]</text>
  <text class="small" x="530" y="515">Cascade when User deleted</text>

  <rect class="entity" x="940" y="150" width="320" height="400"/>
  <rect class="head" x="940" y="150" width="320" height="62" rx="18"/>
  <text class="field" x="1080" y="188">Track</text>
  <text class="pk" x="970" y="245">PK id: String uuid</text>
  <text class="field" x="970" y="280">title: String</text>
  <text class="field" x="970" y="315">artist: String?</text>
  <text class="field" x="970" y="350">url: String</text>
  <text class="field" x="970" y="385">duration: Int?</text>
  <text class="fk" x="970" y="420">FK albumId: String</text>
  <text class="field" x="970" y="455">sourceType: String?</text>
  <text class="field" x="970" y="490">sourceId: String?</text>
  <text class="small" x="970" y="525">Index: [albumId]</text>

  <path class="rel" d="M390 330 C430 330 455 330 500 330"/>
  <path class="rel" d="M830 345 C875 345 900 345 940 345"/>
  <text class="field" x="414" y="310">1 owns many</text>
  <text class="field" x="850" y="325">1 contains many</text>

  <rect class="note" x="180" y="610" width="940" height="90"/>
  <text class="field" x="210" y="645">Ownership rule:</text>
  <text class="small" x="210" y="675">Album.userId is the owner source. Track owner is resolved through Track.album.userId.</text>
  <text class="small" x="210" y="700">This prevents frontend userId spoofing and keeps every song operation scoped to the authenticated user.</text>
</svg>
