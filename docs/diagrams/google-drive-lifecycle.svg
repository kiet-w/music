<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="760" viewBox="0 0 1450 760" role="img" aria-labelledby="title desc">
  <title id="title">Google Drive Import Lifecycle</title>
  <desc id="desc">Lifecycle for Google Drive token, file listing, import, storage upload, and track creation.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:800 34px Arial,sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:18}.g{fill:#e0f2fe;stroke:#0284c7}.b{fill:#dcfce7;stroke:#16a34a}.w{fill:#fef3c7;stroke:#d97706}.e{fill:#fee2e2;stroke:#dc2626}.txt{font:700 18px Arial,sans-serif;fill:#0f172a}.small{font:400 15px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#a)}.dash{stroke:#64748b;stroke-width:2;fill:none;marker-end:url(#a);stroke-dasharray:7 7}</style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1450" height="760"/>
  <text class="title" x="60" y="58">Google Drive Import Lifecycle</text>
  <text class="small" x="62" y="88">Frontend obtains Google token, backend verifies app JWT and album ownership, then imports files.</text>
  <rect class="box g" x="60" y="210" width="190" height="90"/><text class="txt" x="92" y="244">Need Token</text><text class="small" x="86" y="272">Google consent</text>
  <rect class="box g" x="310" y="210" width="210" height="90"/><text class="txt" x="350" y="244">Token Ready</text><text class="small" x="350" y="272">drive.readonly</text>
  <rect class="box b" x="590" y="210" width="210" height="90"/><text class="txt" x="632" y="244">List Files</text><text class="small" x="618" y="272">GET /drive/files</text>
  <rect class="box b" x="870" y="210" width="210" height="90"/><text class="txt" x="910" y="244">Pick Files</text><text class="small" x="900" y="272">DrivePicker</text>
  <rect class="box w" x="590" y="420" width="210" height="90"/><text class="txt" x="630" y="454">Importing</text><text class="small" x="615" y="482">POST /drive/import</text>
  <rect class="box w" x="870" y="420" width="210" height="90"/><text class="txt" x="910" y="454">Upload File</text><text class="small" x="898" y="482">Supabase Storage</text>
  <rect class="box b" x="1150" y="420" width="210" height="90"/><text class="txt" x="1185" y="454">Track Ready</text><text class="small" x="1175" y="482">sourceType drive</text>
  <rect class="box e" x="310" y="560" width="260" height="90"/><text class="txt" x="390" y="594">Error</text><text class="small" x="335" y="622">Google/API/storage/import failure</text>
  <path class="arrow" d="M250 255 L310 255"/><path class="arrow" d="M520 255 L590 255"/><path class="arrow" d="M800 255 L870 255"/>
  <path class="arrow" d="M975 300 C940 360 760 385 695 420"/>
  <path class="arrow" d="M800 465 L870 465"/><path class="arrow" d="M1080 465 L1150 465"/>
  <path class="dash" d="M695 300 C640 470 520 540 445 560"/><path class="dash" d="M975 510 C830 585 680 615 570 610"/>
  <text class="small" x="72" y="690">Different from YouTube: current implementation imports Google Drive files inside the HTTP request and creates a ready Track immediately.</text>
</svg>
